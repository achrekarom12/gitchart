<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Dark background with rounded corners -->
  <rect width="32" height="32" rx="6" fill="#0d1117"/>

  <!-- 5×5 contribution heatmap grid, centered -->
  <!-- Col 0 -->
  <rect x="5"  y="5"  width="4" height="4" rx="1" fill="#161b22"/>
  <rect x="5"  y="10" width="4" height="4" rx="1" fill="#0e4429"/>
  <rect x="5"  y="15" width="4" height="4" rx="1" fill="#006d32"/>
  <rect x="5"  y="20" width="4" height="4" rx="1" fill="#26a641"/>
  <rect x="5"  y="25" width="4" height="4" rx="1" fill="#39d353"/>

  <!-- Col 1 -->
  <rect x="10" y="5"  width="4" height="4" rx="1" fill="#0e4429"/>
  <rect x="10" y="10" width="4" height="4" rx="1" fill="#26a641"/>
  <rect x="10" y="15" width="4" height="4" rx="1" fill="#39d353"/>
  <rect x="10" y="20" width="4" height="4" rx="1" fill="#006d32"/>
  <rect x="10" y="25" width="4" height="4" rx="1" fill="#26a641"/>

  <!-- Col 2 -->
  <rect x="15" y="5"  width="4" height="4" rx="1" fill="#39d353"/>
  <rect x="15" y="10" width="4" height="4" rx="1" fill="#006d32"/>
  <rect x="15" y="15" width="4" height="4" rx="1" fill="#161b22"/>
  <rect x="15" y="20" width="4" height="4" rx="1" fill="#39d353"/>
  <rect x="15" y="25" width="4" height="4" rx="1" fill="#0e4429"/>

  <!-- Col 3 -->
  <rect x="20" y="5"  width="4" height="4" rx="1" fill="#26a641"/>
  <rect x="20" y="10" width="4" height="4" rx="1" fill="#39d353"/>
  <rect x="20" y="15" width="4" height="4" rx="1" fill="#26a641"/>
  <rect x="20" y="20" width="4" height="4" rx="1" fill="#161b22"/>
  <rect x="20" y="25" width="4" height="4" rx="1" fill="#006d32"/>

  <!-- Col 4 -->
  <rect x="25" y="5"  width="4" height="4" rx="1" fill="#006d32"/>
  <rect x="25" y="10" width="4" height="4" rx="1" fill="#161b22"/>
  <rect x="25" y="15" width="4" height="4" rx="1" fill="#0e4429"/>
  <rect x="25" y="20" width="4" height="4" rx="1" fill="#26a641"/>
  <rect x="25" y="25" width="4" height="4" rx="1" fill="#39d353"/>
</svg>
